name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write
  contents: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Pack extension
        run: |
          zip -r extension-${{ github.ref_name }}.zip . \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude ".claude/*" \
            --exclude "*.md"

      - name: Attest build provenance
        id: attest
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: extension-${{ github.ref_name }}.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            extension-${{ github.ref_name }}.zip
            ${{ steps.attest.outputs.bundle-path }}
          generate_release_notes: true
